<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACT Academy UI Mockup</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="device-container">
        <div class="iphone-mockup">
            <div class="screen">
                <header>
                    <span class="icon">☰</span>
                    <h1>Lesson Hub</h1>
                    <span class="icon">⚙️</span>
                </header>
                
                <div class="content">
                    <div class="progress-circle">
                        <div class="circle-inner">
                            <span class="number">135</span>
                            <span class="sub">lesson</span>
                        </div>
                    </div>
                    <p class="label">Tracker progress</p>

                    <h3>Modules</h3>
                    <div class="module-grid">
                        <div class="module-card active">
                            <div class="mod-icon">🖋️</div>
                            <span>Grammar</span>
                        </div>
                        <div class="module-card">
                            <div class="mod-icon">📖</div>
                            <span>Vocabulary</span>
                        </div>
                        <div class="module-card">
                            <div class="mod-icon">🌐</div>
                            <span>Culture</span>
                        </div>
                    </div>
                </div>
                
                <nav class="tab-bar">
                    <span class="active">🏠</span>
                    <span>🔗</span>
                    <span>⚙️</span>
                </nav>
            </div>
        </div>

        <div class="iphone-mockup">
            <div class="screen">
                <header>
                    <span class="icon">〈</span>
                    <h1>Milestones</h1>
                    <span class="icon"></span>
                </header>

                <div class="content">
                    <div class="badge-orbit">
                        <div class="center-badge">🏆</div>
                        <div class="orbit-item">⭐</div>
                        <div class="orbit-item">☕</div>
                    </div>

                    <h3>Historical achievement</h3>
                    <div class="chart-container">
                        <div class="bar" style="width: 90%;"><span>2024</span></div>
                        <div class="bar" style="width: 60%;"><span>2000</span></div>
                        <div class="bar" style="width: 50%;"><span>1986</span></div>
                        <div class="bar" style="width: 45%;"><span>1986</span></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="iphone-mockup">
            <div class="screen">
                <header>
                    <span class="icon">〈</span>
                    <h1>Goal Streak</h1>
                    <span class="icon"></span>
                </header>

                <div class="content align-center">
                    <div class="streak-number">3</div>
                    <h3>Goal Streak</h3>
                    <p class="sub-text">The weekly progress</p>
                    
                    <div class="mini-graph">
                        <div class="graph-placeholder">📈 Weekly Stats</div>
                    </div>

                    <button class="btn-commit">Stay Committed</button>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
